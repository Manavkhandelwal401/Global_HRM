steps:
  # ─────────────────────────────────────────────────────────────
  # 1. Build Backend Docker image
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
      - '.'
    dir: 'Backend'

  # ─────────────────────────────────────────────────────────────
  # 2. Push Backend image to Artifact Registry
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
    waitFor: ['build-backend']

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy Backend to Cloud Run (no Cloud SQL needed - auth is in-memory)
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "Deploying backend to Cloud Run..."
        gcloud run deploy global-hrm-backend \
          --image=asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,SKIP_KEYVAULT=true,Cors__AllowedOrigins__0=https://globalhrm.me,Cors__AllowedOrigins__1=https://www.globalhrm.me,Cors__AllowedOrigins__2=https://global-hrm-frontend-230429510558.us-central1.run.app \
          --project=global-hrm-20230625

        echo "Getting backend URL..."
        BACKEND_URL=$$(gcloud run services describe global-hrm-backend \
          --region=us-central1 \
          --project=global-hrm-20230625 \
          --format='value(status.url)')

        echo "Backend URL: $$BACKEND_URL"
        echo -n "$$BACKEND_URL" > /workspace/backend_url.txt
        cat /workspace/backend_url.txt
    waitFor: ['push-backend']

  # ─────────────────────────────────────────────────────────────
  # 4. Build Frontend image with backend URL injected at build time
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        echo "Backend URL from file: $$BACKEND_URL"
        if [ -z "$$BACKEND_URL" ]; then
          echo "ERROR: backend_url.txt is empty!"
          exit 1
        fi
        docker build \
          --build-arg NEXT_PUBLIC_DISABLE_AUTH=false \
          --build-arg NEXT_PUBLIC_API_BASE_URL=$$BACKEND_URL \
          --build-arg NEXT_PUBLIC_GRAPHQL_URL=$$BACKEND_URL/graphql \
          -t asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest \
          ./Frontend
    waitFor: ['deploy-backend']

  # ─────────────────────────────────────────────────────────────
  # 5. Push Frontend image to Artifact Registry
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest'
    waitFor: ['build-frontend']

  # ─────────────────────────────────────────────────────────────
  # 6. Deploy Frontend to Cloud Run
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        gcloud run deploy global-hrm-frontend \
          --image=asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --set-env-vars=NEXT_PUBLIC_DISABLE_AUTH=false \
          --project=global-hrm-20230625
        echo "Frontend deployed!"
    waitFor: ['push-frontend']

images:
  - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
  - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '3600s'
