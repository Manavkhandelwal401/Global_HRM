steps:
  # ─────────────────────────────────────────────────────────────
  # 0. Provision Cloud SQL (PostgreSQL) if it doesn't exist yet
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'provision-cloudsql'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if gcloud sql instances describe global-hrm-db --project=global-hrm-20230625 2>/dev/null; then
          echo "Cloud SQL instance already exists."
        else
          echo "Creating Cloud SQL PostgreSQL instance..."
          gcloud sql instances create global-hrm-db \
            --database-version=POSTGRES_15 \
            --cpu=1 \
            --memory=3840MB \
            --region=us-central1 \
            --project=global-hrm-20230625 \
            --root-password=Bnmqwe#123 \
            --no-backup \
            --storage-size=10GB \
            --storage-type=SSD
          gcloud sql databases create HRMS \
            --instance=global-hrm-db \
            --project=global-hrm-20230625 || true
          echo "Cloud SQL ready."
        fi

  # ─────────────────────────────────────────────────────────────
  # 1. Build Backend Docker image (Django)
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
      - '.'
    dir: 'Backend'
    waitFor: ['provision-cloudsql']

  # ─────────────────────────────────────────────────────────────
  # 2. Push Backend image to Artifact Registry
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
    waitFor: ['build-backend']

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy Backend (Django) to Cloud Run
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "Deploying Django backend to Cloud Run (us-central1)..."
        gcloud run deploy global-hrm-backend \
          --image=asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5 \
          --add-cloudsql-instances=global-hrm-20230625:us-central1:global-hrm-db \
          --update-env-vars=DB_HOST=/cloudsql/global-hrm-20230625:us-central1:global-hrm-db \
          --update-env-vars=DB_NAME=HRMS \
          --update-env-vars=DB_USER=postgres \
          --update-env-vars=DB_PASS=Bnmqwe#123 \
          --update-env-vars=DB_PORT=5432 \
          --update-env-vars=DEBUG=False \
          --update-env-vars=ALLOWED_HOSTS=globalhrm.me \
          --update-env-vars=SECRET_KEY=django-secure-prod-key-globalhrm-2024-xp9mn7it2m5hy3l4e6 \
          --update-env-vars=CORS_ALLOW_ALL_ORIGINS=True \
          --project=global-hrm-20230625

        echo "Getting backend URL..."
        BACKEND_URL=$$(gcloud run services describe global-hrm-backend \
          --region=us-central1 \
          --project=global-hrm-20230625 \
          --format='value(status.url)')

        echo "Backend URL: $$BACKEND_URL"
        echo -n "$$BACKEND_URL" > /workspace/backend_url.txt
        cat /workspace/backend_url.txt
    waitFor: ['push-backend']

  # ─────────────────────────────────────────────────────────────
  # 4. Build Frontend image with backend URL injected at build time
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        echo "Backend URL: $$BACKEND_URL"
        if [ -z "$$BACKEND_URL" ]; then
          echo "ERROR: backend_url.txt is empty!"
          exit 1
        fi
        docker build \
          --build-arg NEXT_PUBLIC_DISABLE_AUTH=false \
          --build-arg NEXT_PUBLIC_API_BASE_URL=$$BACKEND_URL \
          --build-arg NEXT_PUBLIC_GRAPHQL_URL=$$BACKEND_URL/graphql \
          -t asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest \
          ./Frontend
    waitFor: ['deploy-backend']

  # ─────────────────────────────────────────────────────────────
  # 5. Push Frontend image to Artifact Registry
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest'
    waitFor: ['build-frontend']

  # ─────────────────────────────────────────────────────────────
  # 6. Deploy Frontend to Cloud Run (us-central1 - domain mapped)
  # ─────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        echo "Deploying frontend to Cloud Run (us-central1)..."
        gcloud run deploy global-hrm-frontend \
          --image=asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest \
          --region=us-central1 \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --set-env-vars=NEXT_PUBLIC_DISABLE_AUTH=false \
          --update-env-vars=NEXT_PUBLIC_API_BASE_URL=$$BACKEND_URL \
          --update-env-vars=NEXT_PUBLIC_GRAPHQL_URL=$$BACKEND_URL/graphql \
          --project=global-hrm-20230625
        echo "Frontend deployed to us-central1!"

        if gcloud run services describe global-hrm-frontend --region=asia-south1 --project=global-hrm-20230625 2>/dev/null; then
          echo "Updating asia-south1 frontend..."
          gcloud run deploy global-hrm-frontend \
            --image=asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest \
            --region=asia-south1 \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars=NEXT_PUBLIC_DISABLE_AUTH=false \
            --update-env-vars=NEXT_PUBLIC_API_BASE_URL=$$BACKEND_URL \
            --update-env-vars=NEXT_PUBLIC_GRAPHQL_URL=$$BACKEND_URL/graphql \
            --project=global-hrm-20230625
          echo "Asia-south1 frontend updated!"
        fi
    waitFor: ['push-frontend']

images:
  - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-backend:latest'
  - 'asia-south1-docker.pkg.dev/global-hrm-20230625/global-hrm-repo/global-hrm-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '3600s'
